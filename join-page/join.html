<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Chamber Home</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="join.css">
    </head>
    <body>
        <header>
            <p><span id="bannerMessage"></span></p>
            <div class="title"><h1>Join</h1></div>
            <nav>
                <ul class="navigation">
                    <li><a class="navig" href="#">Menu</a></li>
                    <li><a href="#">Home</a></li>
                    <li><a href="https://github.com/FelixS2000/wdd230/blob/main/image-section/discover.html">Discover</a></li>
                    <li><a href="#">Directory</a></li>
                    <li><a href="#">Join</a></li>
                    <li><a href="#">Contact</a></li>  
                </ul>
            </nav>
            <p><span id="lastTime"></span></p>
        </header>

        <main>
            <div class="firstName">
               <label for="firstName">
                <p>First Name: <input type="text" name="" id="firstName"></p>
               </label> 
            </div>
            <div class="lastName">
                <label for="lastName">
                    <p>Last Name: <input type="text" name="" id="lastName"></p>
                </label>
            </div>
            <div class="emailUser">
                <label for="emailUser">
                    <p>Email contact: <input type="email" placeholder="Write your email here" id="emailUser"></p>
                </label>
            </div>
            <div class="phoneNumber">
                <label for="phoneNumber">
                    <p>Phone number: <input type="number" name="" id="phoneNumber"></p>
                </label>
            </div>
            <div class="membershipLevel">
                <label for="membershipLevel">Choose a membership:</label>
                <select name="membership" id="membership-level">
                    <option value="">Please choose a membership
                </option>
                    <option value="npMembership">NP Membership is for non profit organizations and there is no fee.</option>
                    <option value="bronzeMembership">Bronze Membership.</option>
                    <option value="silverMembership">Silver Membership</option>
                    <option value="goldMembership">Gold Membership</option>
                </select>
            </div>
            <div class="submitButton">
                <label for="submitBtn">
                    <input type="submit" value="Submit" id="Submit">
                </label>
            </div>
            
        </main>
        <script src="join.js"></script>
    </body>
</html>
